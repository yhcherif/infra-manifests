apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo
  namespace: argocd
spec:
  project: default
  source:
    # REMPLACE par l'URL de TON dépôt de manifestes
    repoURL: https://github.com/yhcherif/infra-manifests.git
    targetRevision: main
    path: apps/demo
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  syncPolicy:
    automated:
      prune: true      # supprime ce qui n'est plus dans Git
      selfHeal: true   # ré-applique si le cluster dérive
    syncOptions:
      - CreateNamespace=true